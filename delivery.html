<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIKA Pilot | Delivery App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
        body{font-family:'Outfit',sans-serif;background:#0f172a;color:#fff;padding-bottom:20px;user-select:none;}
        ::-webkit-scrollbar{display:none;}
        *{-ms-overflow-style:none;scrollbar-width:none;}
        .glass{background:rgba(30,41,59,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.06);}
        .slide-up{animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;}
        @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes spin{to{transform:rotate(360deg)}}
        .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}
        .blink{animation:blinker 1.2s ease-in-out infinite;}
        @keyframes blinker{0%,100%{opacity:1}50%{opacity:0.3}}
        .tab-active{background:#ea580c;color:#fff;box-shadow:0 4px 16px rgba(234,88,12,0.4);}
        .tab-inactive{background:rgba(30,41,59,0.6);color:#94a3b8;border:1px solid rgba(255,255,255,0.06);}
        .tap:active{transform:scale(0.95);transition:transform 0.1s;}
        /* Toggle */
        .duty-toggle{position:relative;display:inline-block;width:56px;height:28px;}
        .duty-toggle input{opacity:0;width:0;height:0;}
        .duty-slider{position:absolute;cursor:pointer;inset:0;background:#334155;border-radius:28px;transition:0.3s;}
        .duty-slider:before{content:'';position:absolute;height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.3s;}
        input:checked + .duty-slider{background:#22c55e;}
        input:checked + .duty-slider:before{transform:translateX(28px);}
        /* New order pulse */
        .new-order-pulse{animation:newOrderPulse 2s ease-in-out infinite;}
        @keyframes newOrderPulse{0%,100%{box-shadow:0 0 0 0 rgba(234,88,12,0.4)}50%{box-shadow:0 0 0 12px rgba(234,88,12,0)}}
    </style>
</head>
<body class="select-none">

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<!-- PWA Banner -->
<div id="pwaRider" class="hidden fixed top-0 left-0 w-full bg-blue-600 text-white p-3 z-[200] flex justify-between items-center shadow-xl">
    <div class="flex items-center gap-2">
        <i class="fas fa-motorcycle text-sm"></i>
        <p class="text-xs font-black">Install VIKA Pilot App</p>
    </div>
    <button id="pwaBtnRider" class="bg-white text-blue-600 px-4 py-1.5 rounded-xl text-[10px] font-black tap">INSTALL</button>
</div>

<!-- LOGIN -->
<div id="login" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
    <div class="text-center w-full max-w-sm">
        <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-2xl border border-white/10">
            <i class="fas fa-motorcycle text-4xl text-white"></i>
        </div>
        <h2 class="text-3xl font-black mb-1 tracking-tighter text-white">VIKA PILOT</h2>
        <p class="text-xs text-slate-500 font-bold mb-8 uppercase tracking-[0.2em]">Delivery Partner Login</p>

        <div class="space-y-3">
            <div class="relative">
                <i class="fas fa-phone absolute left-4 top-4 text-slate-500 text-sm"></i>
                <input id="lPhone" type="tel" maxlength="10" placeholder="Mobile Number" class="w-full bg-slate-900/60 border border-slate-800 p-4 pl-11 rounded-2xl text-white font-bold outline-none focus:border-blue-500 transition">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-slate-500 text-sm"></i>
                <input id="lPass" type="password" placeholder="Password" class="w-full bg-slate-900/60 border border-slate-800 p-4 pl-11 rounded-2xl text-white font-bold outline-none focus:border-blue-500 transition" onkeydown="if(event.key==='Enter')document.getElementById('loginBtn').click()">
            </div>
            <button id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition uppercase tracking-wider tap">Start Engine 🚀</button>
            <button onclick="document.getElementById('registerModal').classList.remove('hidden')" class="w-full bg-slate-800/80 text-slate-300 py-3 rounded-2xl font-bold text-sm border border-slate-700 hover:bg-slate-700 transition tap">JOIN THE FLEET (REGISTER)</button>
        </div>
    </div>
</div>

<!-- REGISTER MODAL -->
<div id="registerModal" class="fixed inset-0 bg-slate-950/98 z-[110] hidden flex items-center justify-center p-6 backdrop-blur-sm">
    <div class="bg-slate-900 w-full max-w-sm rounded-[2rem] p-7 border border-slate-800 shadow-2xl slide-up">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="document.getElementById('registerModal').classList.add('hidden')" class="w-9 h-9 bg-slate-800 rounded-xl flex items-center justify-center text-slate-400 tap"><i class="fas fa-arrow-left text-sm"></i></button>
            <h3 class="text-xl font-black text-white">Rider Registration</h3>
        </div>
        <div class="space-y-3">
            <input id="regName" placeholder="Full Name" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 text-white outline-none focus:border-blue-500 font-bold text-sm">
            <input id="regPhone" type="tel" maxlength="10" placeholder="Mobile Number" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 text-white outline-none focus:border-blue-500 font-bold text-sm">
            <input id="regPass" type="password" placeholder="Create Password" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 text-white outline-none focus:border-blue-500 font-bold text-sm">
            <select id="regVeh" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 text-white outline-none focus:border-blue-500 font-bold text-sm">
                <option value="Motorcycle">Motorcycle</option>
                <option value="Scooter">Scooter</option>
                <option value="Electric Bike">Electric Bike</option>
                <option value="Bicycle">Bicycle</option>
            </select>
            <button id="submitRegBtn" class="w-full bg-green-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-green-700 transition tap">SUBMIT APPLICATION</button>
        </div>
        <p class="text-center text-[10px] text-slate-500 mt-4">Your application will be reviewed by admin before approval</p>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">

    <!-- HEADER -->
    <header class="fixed top-0 w-full bg-slate-900/95 backdrop-blur-md z-40 px-5 py-4 flex justify-between items-center border-b border-white/5 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-full bg-blue-600/20 border-2 border-blue-600/40 flex items-center justify-center text-blue-400 font-black text-lg" id="riderAvatarText">?</div>
            <div>
                <h1 class="font-black text-lg leading-none text-white tracking-tight" id="rName">Pilot</h1>
                <div class="flex items-center gap-1.5 mt-1" id="statusIndicator">
                    <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                    <span class="text-[10px] font-bold text-red-500 uppercase tracking-wider">Offline</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-[10px] font-bold text-slate-400" id="vehicleLabel"></span>
            <label class="duty-toggle tap">
                <input type="checkbox" id="dutyToggle">
                <span class="duty-slider"></span>
            </label>
        </div>
    </header>

    <div class="pt-24 px-4 pb-6">

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="glass p-4 rounded-2xl">
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1">Today's Earnings</p>
                <h2 class="text-3xl font-black text-green-400">₹<span id="todayEarn">0</span></h2>
                <p class="text-[9px] text-slate-500 mt-1"><span id="todayDeliveries">0</span> deliveries</p>
            </div>
            <div class="glass p-4 rounded-2xl border border-orange-500/20">
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1">Cash to Deposit</p>
                <h2 class="text-3xl font-black text-orange-400">₹<span id="cashHand">0</span></h2>
                <p class="text-[9px] text-slate-500 mt-1">COD pending</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-5 overflow-x-auto pb-1">
            <button onclick="switchTab('new')" id="tab-new" class="tab-active px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all flex items-center gap-2">
                New <span id="newCount" class="bg-white text-orange-500 text-[9px] px-1.5 py-0.5 rounded-full hidden font-black">0</span>
            </button>
            <button onclick="switchTab('active')" id="tab-active" class="tab-inactive px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all">My Tasks</button>
            <button onclick="switchTab('hist')" id="tab-hist" class="tab-inactive px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all">History</button>
        </div>

        <!-- Views -->
        <div id="view-new" class="view-section space-y-4"></div>
        <div id="view-active" class="view-section hidden space-y-4"></div>
        <div id="view-hist" class="view-section hidden space-y-4"></div>
    </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div id="orderModal" class="fixed inset-0 bg-black/90 z-[80] hidden flex items-end justify-center backdrop-blur-sm">
    <div class="bg-slate-900 w-full max-w-md rounded-t-[2.5rem] p-6 slide-up border-t border-white/10 max-h-[88vh] overflow-y-auto">
        <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-6"></div>
        <div id="modalContent"></div>
        <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="w-full mt-5 bg-slate-800 py-3.5 rounded-2xl font-bold text-slate-400 text-xs tracking-widest uppercase hover:bg-slate-700 transition tap">Close</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, onSnapshot, query, where, arrayUnion, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCwyzE9sdZZUU3dHUix23zEzFkGr2nNRyw",
    authDomain: "foodhub-8ae15.firebaseapp.com",
    projectId: "foodhub-8ae15",
    storageBucket: "foodhub-8ae15.firebasestorage.app",
    messagingSenderId: "274265160043",
    appId: "1:274265160043:web:81238fd424681e7f70342e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let me = null, allShops = [], ordersList = [], isOnline = false, audioAllowed = false;
let prevNewOrderCount = 0;

// Audio init on first tap
document.body.addEventListener('click', () => {
    if (!audioAllowed) {
        document.getElementById('alertSound').play().then(() => {
            document.getElementById('alertSound').pause();
            document.getElementById('alertSound').currentTime = 0;
            audioAllowed = true;
        }).catch(() => {});
    }
});

// PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('pwaRider').classList.remove('hidden');
});
document.getElementById('pwaBtnRider').onclick = () => { if (deferredPrompt) deferredPrompt.prompt(); };

// --- LOGIN ---
document.getElementById('loginBtn').onclick = async () => {
    let p = document.getElementById('lPhone').value.trim();
    let pass = document.getElementById('lPass').value.trim();
    if (!p || !pass) return alert("Enter mobile & password");

    let btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spinner"></span> Verifying...';
    btn.disabled = true;

    try {
        const q = query(collection(db, "riders"), where("phone", "==", p), where("pass", "==", pass));
        const snap = await getDocs(q);

        if (!snap.empty) {
            me = { id: snap.docs[0].id, ...snap.docs[0].data() };
            document.getElementById('login').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('rName').innerText = me.name.split(' ')[0];
            document.getElementById('riderAvatarText').innerText = me.name[0].toUpperCase();
            document.getElementById('vehicleLabel').innerText = me.vehicle || '';

            if (me.isOnline) {
                isOnline = true;
                document.getElementById('dutyToggle').checked = true;
                setOnlineUI();
            }
            initData();
        } else {
            alert("❌ Account not found or pending approval.\nContact admin if you just registered.");
        }
    } catch (e) {
        alert("Connection error. Check internet.");
    }

    btn.innerHTML = 'Start Engine 🚀';
    btn.disabled = false;
};

// --- REGISTER ---
document.getElementById('submitRegBtn').onclick = async () => {
    let n = document.getElementById('regName').value.trim();
    let p = document.getElementById('regPhone').value.trim();
    let ps = document.getElementById('regPass').value.trim();
    let v = document.getElementById('regVeh').value;
    if (!n || !p || !ps || p.length < 10) return alert("Fill all fields with valid 10-digit mobile");

    await addDoc(collection(db, "rider_requests"), { name: n, phone: p, pass: ps, vehicle: v, timestamp: Date.now() });
    alert("✅ Application sent!\nAdmin will review and approve within 24hrs.");
    document.getElementById('registerModal').classList.add('hidden');
};

// --- DUTY TOGGLE ---
document.getElementById('dutyToggle').addEventListener('change', async e => {
    isOnline = e.target.checked;
    if (me) {
        try {
            await updateDoc(doc(db, "riders", me.id), { isOnline });
            isOnline ? setOnlineUI() : setOfflineUI();
        } catch (err) {
            console.error("Toggle failed:", err);
        }
    }
});

function setOnlineUI() {
    document.getElementById('statusIndicator').innerHTML = `<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-[10px] font-bold text-green-400 uppercase tracking-wider">Online</span>`;
    renderAllViews();
}

function setOfflineUI() {
    document.getElementById('statusIndicator').innerHTML = `<span class="w-2 h-2 bg-red-500 rounded-full"></span><span class="text-[10px] font-bold text-red-500 uppercase tracking-wider">Offline</span>`;
    renderAllViews();
}

// --- DATA ---
async function initData() {
    try {
        const sSnap = await getDocs(collection(db, "shops"));
        allShops = sSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) {}

    onSnapshot(collection(db, "orders"), snap => {
        ordersList = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        if (isOnline) {
            let newOrders = ordersList.filter(o => !o.riderPhone && o.status === 'Ready for Pickup');
            let count = newOrders.length;
            document.getElementById('newCount').innerText = count;
            document.getElementById('newCount').classList.toggle('hidden', count === 0);

            // Play sound when new orders arrive
            if (count > prevNewOrderCount && audioAllowed) {
                document.getElementById('alertSound').play().catch(() => {});
                if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
            }
            prevNewOrderCount = count;
        }

        calculateStats();
        renderAllViews();
    });
}

function calculateStats() {
    if (!me) return;
    let today = new Date().toLocaleDateString('en-IN');
    let myDelivered = ordersList.filter(o => o.riderPhone === me.phone && o.status === 'Delivered');
    let todayDelivered = myDelivered.filter(o => o.date === today);
    let todayEarned = todayDelivered.reduce((acc, o) => acc + (parseInt(o.deliveryFee) || 40), 0);
    let deliveryCount = todayDelivered.length;
    let cashHand = myDelivered.filter(o => (o.paymentMethod === 'Cash' || o.paymentMethod === 'COD') && !o.adminCollected)
        .reduce((acc, o) => acc + (parseInt(o.total) || 0), 0);

    document.getElementById('todayEarn').innerText = todayEarned;
    document.getElementById('todayDeliveries').innerText = deliveryCount;
    document.getElementById('cashHand').innerText = cashHand;
}

// --- RENDER ---
window.switchTab = (tab) => {
    ['new', 'active', 'hist'].forEach(t => {
        let btn = document.getElementById(`tab-${t}`);
        let view = document.getElementById(`view-${t}`);
        btn.className = t === tab ? 'tab-active px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all flex items-center gap-2' : 'tab-inactive px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all';
        view?.classList.toggle('hidden', t !== tab);
    });
};

function renderAllViews() {
    if (!isOnline) {
        document.getElementById('view-new').innerHTML = emptyState('fa-power-off text-red-500', 'You Are Offline', 'Toggle the switch to go online and receive orders');
        return;
    }

    let newOrders = ordersList.filter(o => !o.riderPhone && o.status === 'Ready for Pickup');
    document.getElementById('view-new').innerHTML = newOrders.length ? newOrders.map(o => renderCard(o, 'new')).join('') : emptyState('fa-inbox text-slate-600', 'No New Orders', 'New orders will appear here automatically');

    let activeTasks = ordersList.filter(o => o.riderPhone === me.phone && !['Delivered', 'Cancelled'].includes(o.status));
    document.getElementById('view-active').innerHTML = activeTasks.length ? activeTasks.map(o => renderCard(o, 'active')).join('') : emptyState('fa-road text-slate-600', 'No Active Tasks', 'Accept an order to see it here');

    let history = ordersList.filter(o => o.riderPhone === me.phone && ['Delivered', 'Cancelled'].includes(o.status)).slice(0, 15);
    document.getElementById('view-hist').innerHTML = history.length ? history.map(o => renderCard(o, 'hist')).join('') : emptyState('fa-clock-rotate-left text-slate-600', 'No Delivery History', 'Completed deliveries will appear here');
}

function renderCard(o, type) {
    let shop = allShops.find(s => s.id == o.shopId) || { shopName: 'Store', location: '0,0' };
    let shopLink = shop.location && shop.location !== '0,0' ? `https://www.google.com/maps/dir/?api=1&destination=${shop.location}` : `https://www.google.com/maps/search/${encodeURIComponent(shop.shopName)}`;
    let custLat = o.customer?.lat || 0;
    let custLng = o.customer?.lng || 0;
    let custLink = (custLat && custLng) ? `https://www.google.com/maps/dir/?api=1&destination=${custLat},${custLng}` : `https://www.google.com/maps/search/${encodeURIComponent(o.customer?.addr || 'Unknown')}`;

    let actionBtn = '';
    if (type === 'new') {
        actionBtn = `<button onclick="acceptOrder('${o.id}')" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg hover:bg-blue-700 transition tap new-order-pulse"><i class="fas fa-check mr-2"></i>ACCEPT DELIVERY</button>`;
    } else if (type === 'active') {
        if (o.status === 'Ready for Pickup' || o.status === 'Rider Assigned') {
            actionBtn = `<div class="grid grid-cols-2 gap-2">
                <a href="${shopLink}" target="_blank" class="bg-slate-700 text-white py-3 rounded-xl font-bold text-xs text-center flex items-center justify-center gap-2 tap hover:bg-slate-600 transition"><i class="fas fa-location-arrow"></i> Navigate</a>
                <button onclick="upd('${o.id}','Out for Delivery')" class="bg-orange-600 text-white py-3 rounded-xl font-black text-xs shadow-lg tap hover:bg-orange-700 transition blink"><i class="fas fa-motorcycle mr-1"></i>PICKED UP</button>
            </div>`;
        } else if (o.status === 'Out for Delivery') {
            actionBtn = `<div class="grid grid-cols-2 gap-2">
                <a href="${custLink}" target="_blank" class="bg-slate-700 text-white py-3 rounded-xl font-bold text-xs text-center flex items-center justify-center gap-2 tap hover:bg-slate-600 transition"><i class="fas fa-location-arrow"></i> Navigate</a>
                <button onclick="upd('${o.id}','Arrived')" class="bg-blue-600 text-white py-3 rounded-xl font-black text-xs shadow-lg tap hover:bg-blue-700 transition"><i class="fas fa-house mr-1"></i>ARRIVED</button>
            </div>`;
        } else if (o.status === 'Arrived') {
            let isCod = o.paymentMethod !== 'UPI';
            actionBtn = `<button onclick="upd('${o.id}','Delivered')" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg tap hover:bg-green-700 transition">
                ${isCod ? '<i class="fas fa-money-bill-wave mr-2"></i>COLLECT ₹' + o.total + ' & MARK DELIVERED' : '<i class="fas fa-check-circle mr-2"></i>MARK DELIVERED'}
            </button>`;
        }
    }

    let borderColor = type === 'new' ? 'border-blue-500' : type === 'active' ? 'border-orange-500' : 'border-slate-600';

    return `
    <div class="glass p-5 rounded-[2rem] slide-up mb-3 border-l-[3px] ${borderColor}">
        <div class="flex justify-between items-start mb-4">
            <div>
                <span class="bg-slate-800 px-3 py-1 rounded-full text-[9px] font-black uppercase text-slate-300 border border-white/10">#${o.id.substr(0, 6).toUpperCase()}</span>
                <p class="text-[10px] text-slate-500 mt-1">${new Date(o.timestamp).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}</p>
            </div>
            <div class="text-right">
                <span class="font-black text-white text-xl">₹${o.total}</span>
                <p class="text-[9px] font-bold ${o.paymentMethod === 'UPI' ? 'text-green-400' : 'text-orange-400'}">${o.paymentMethod || 'COD'}</p>
            </div>
        </div>

        <!-- Route -->
        <div class="space-y-3 mb-4">
            <div class="flex items-start gap-3">
                <div class="w-7 h-7 bg-orange-600/20 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5"><i class="fas fa-store text-orange-400 text-xs"></i></div>
                <div>
                    <p class="font-black text-sm text-white leading-tight">${shop.shopName}</p>
                    <p class="text-[10px] text-slate-400">Pickup Point</p>
                </div>
            </div>
            <div class="ml-3 border-l border-dashed border-slate-600 h-4"></div>
            <div class="flex items-start gap-3">
                <div class="w-7 h-7 bg-blue-600/20 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5"><i class="fas fa-map-marker-alt text-blue-400 text-xs"></i></div>
                <div>
                    <p class="font-black text-sm text-white leading-tight">${o.customer?.name || 'Customer'}</p>
                    <p class="text-[10px] text-slate-400 line-clamp-2 max-w-[180px]">${o.customer?.addr || 'Address not provided'}</p>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-2 items-center">
            <button onclick="showDetails('${o.id}')" class="glass w-10 h-10 rounded-xl text-slate-300 flex items-center justify-center hover:bg-slate-700 transition tap flex-shrink-0"><i class="fas fa-eye text-sm"></i></button>
            ${type !== 'hist' ? `<a href="tel:${o.customer?.phone}" class="glass w-10 h-10 rounded-xl text-green-400 flex items-center justify-center hover:bg-slate-700 transition tap flex-shrink-0"><i class="fas fa-phone text-sm"></i></a>` : ''}
            <div class="flex-1">${actionBtn}</div>
        </div>

        ${type === 'hist' ? `<div class="mt-3 pt-3 border-t border-white/5 text-right"><span class="text-xs font-black ${o.status === 'Delivered' ? 'text-green-400' : 'text-red-400'}">${o.status}</span></div>` : ''}
    </div>`;
}

function emptyState(icon, title, subtitle) {
    return `<div class="text-center py-16 opacity-40">
        <i class="fas ${icon} text-5xl mb-4"></i>
        <p class="font-black text-base">${title}</p>
        <p class="text-xs mt-1 text-slate-500">${subtitle}</p>
    </div>`;
}

// --- ACTIONS ---
window.acceptOrder = async (oid) => {
    if (!isOnline) return alert("Go Online first!");
    if (!me) return;
    try {
        await updateDoc(doc(db, "orders", oid), {
            riderPhone: me.phone,
            riderName: me.name,
            status: 'Rider Assigned',
            timeline: arrayUnion({ status: 'Rider Assigned', time: new Date().toLocaleTimeString() })
        });
        switchTab('active');
    } catch (e) {
        alert("Error accepting order. Try again.");
    }
};

window.upd = async (oid, status) => {
    let o = ordersList.find(x => x.id === oid);
    if (!o) return;

    if (status === 'Delivered' && (o.paymentMethod === 'Cash' || o.paymentMethod === 'COD')) {
        if (!confirm(`⚠️ COLLECT CASH ₹${o.total} from customer\n\nConfirm you received the payment?`)) return;
    }

    try {
        await updateDoc(doc(db, "orders", oid), {
            status,
            timeline: arrayUnion({ status, time: new Date().toLocaleTimeString() })
        });
        if (status === 'Delivered' && navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
    } catch (e) {
        alert("Update failed. Check connection.");
    }
};

window.showDetails = (oid) => {
    let o = ordersList.find(x => x.id === oid);
    if (!o) return;
    let itemsHtml = (o.items || []).map(i => `
        <div class="flex justify-between py-2 border-b border-white/5 last:border-0">
            <span class="text-slate-300 text-xs font-semibold">${i.qty} × ${i.name}</span>
            <span class="font-black text-white text-xs">₹${i.price * i.qty}</span>
        </div>`).join('');

    let shopInfo = allShops.find(s => s.id == o.shopId);

    document.getElementById('modalContent').innerHTML = `
        <div class="text-center mb-6">
            <h2 class="text-4xl font-black text-white">₹${o.total}</h2>
            <span class="text-[10px] font-black px-3 py-1 rounded-full ${o.paymentMethod === 'UPI' ? 'text-green-400 bg-green-400/10' : 'text-orange-400 bg-orange-400/10'} mt-2 inline-block border ${o.paymentMethod === 'UPI' ? 'border-green-400/20' : 'border-orange-400/20'}">${o.paymentMethod || 'COD'}</span>
        </div>

        <div class="space-y-4">
            <div class="bg-slate-800/60 p-4 rounded-2xl border border-white/5">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-2">📦 Order Items</p>
                ${itemsHtml}
                <div class="flex justify-between pt-2 mt-1 border-t border-white/10">
                    <span class="text-xs text-slate-400 font-bold">Delivery Fee</span>
                    <span class="text-xs font-black text-white">₹${o.deliveryFee || 20}</span>
                </div>
            </div>

            <div class="bg-slate-800/60 p-4 rounded-2xl border border-white/5">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-2">👤 Customer</p>
                <p class="text-white font-black">${o.customer?.name}</p>
                <p class="text-slate-400 text-xs mt-1">${o.customer?.addr}</p>
                <a href="tel:${o.customer?.phone}" class="mt-3 flex items-center justify-center gap-2 bg-green-600 py-2.5 rounded-xl text-xs font-black text-white tap hover:bg-green-700 transition">
                    <i class="fas fa-phone"></i> Call ${o.customer?.phone}
                </a>
            </div>

            ${shopInfo ? `<div class="bg-slate-800/60 p-4 rounded-2xl border border-white/5">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-2">🏪 Pickup Shop</p>
                <p class="text-white font-black">${shopInfo.shopName}</p>
                ${shopInfo.location ? `<a href="https://www.google.com/maps?q=${shopInfo.location}" target="_blank" class="mt-2 block text-center text-[10px] font-bold text-blue-400 hover:underline"><i class="fas fa-map-location-dot mr-1"></i>Open in Maps</a>` : ''}
            </div>` : ''}

            ${o.utr ? `<div class="bg-green-900/30 p-3 rounded-xl border border-green-500/20 text-center">
                <p class="text-[9px] text-green-400 font-bold uppercase">UPI Reference</p>
                <p class="text-white font-black text-sm">${o.utr}</p>
            </div>` : ''}
        </div>`;

    document.getElementById('orderModal').classList.remove('hidden');
};
</script>
</body>
</html>
