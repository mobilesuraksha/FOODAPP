<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIKA Pilot | Delivery App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="icon" id="pilotFavicon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest_rider.json">
    
    <style>
        *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
        body{font-family:'Outfit',sans-serif;background:#0f172a;color:#fff;padding-bottom:20px;user-select:none;}
        ::-webkit-scrollbar{display:none;}
        *{-ms-overflow-style:none;scrollbar-width:none;}
        .glass{background:rgba(30,41,59,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.06);}
        .slide-up{animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;}
        @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
        .fade-in{animation:fadeIn 0.3s ease-out forwards;}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes spin{to{transform:rotate(360deg)}}
        .spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}
        .blink{animation:blinker 1.2s ease-in-out infinite;}
        @keyframes blinker{0%,100%{opacity:1}50%{opacity:0.3}}
        
        /* Tabs */
        .tab-active{background:#ea580c;color:#fff;box-shadow:0 4px 16px rgba(234,88,12,0.4);}
        .tab-inactive{background:rgba(30,41,59,0.6);color:#94a3b8;border:1px solid rgba(255,255,255,0.06);}
        .tap:active{transform:scale(0.95);transition:transform 0.1s;}
        
        /* Duty Toggle */
        .duty-toggle{position:relative;display:inline-block;width:56px;height:28px;}
        .duty-toggle input{opacity:0;width:0;height:0;}
        .duty-slider{position:absolute;cursor:pointer;inset:0;background:#334155;border-radius:28px;transition:0.3s;}
        .duty-slider:before{content:'';position:absolute;height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.3s;box-shadow:0 2px 5px rgba(0,0,0,0.2);}
        input:checked + .duty-slider{background:#22c55e;}
        input:checked + .duty-slider:before{transform:translateX(28px);}
        
        /* New Order Pulse */
        .new-order-pulse{animation:newOrderPulse 2s ease-in-out infinite;}
        @keyframes newOrderPulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,0.5)}50%{box-shadow:0 0 0 12px rgba(37,99,235,0)}}
    </style>
</head>
<body class="select-none">

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div id="appLoader" class="fixed inset-0 bg-slate-950 z-[999] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="w-24 h-24 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-[2rem] flex items-center justify-center shadow-[0_0_40px_rgba(59,130,246,0.3)] mb-5">
        <img id="splashLogo" src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" class="w-12 h-12 invert brightness-0" alt="Logo">
    </div>
    <div class="spinner border-blue-900 border-t-blue-500"></div>
    <p class="mt-4 font-black text-slate-500 uppercase tracking-[0.3em] text-[10px]">Pilot Systems</p>
</div>

<div id="pwaRider" class="hidden fixed top-3 left-3 right-3 bg-blue-600 text-white p-4 rounded-2xl shadow-2xl z-[200] flex justify-between items-center slide-up border border-blue-400">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center"><i class="fas fa-motorcycle text-white"></i></div>
        <div>
            <p class="text-xs font-black">Install Pilot App</p>
            <p class="text-[9px] text-blue-200 font-bold">Fast & offline access</p>
        </div>
    </div>
    <div class="flex gap-2">
        <button id="pwaBtnRider" class="bg-white text-blue-600 px-4 py-2 rounded-xl text-[10px] font-black tap shadow-lg">INSTALL</button>
        <button onclick="document.getElementById('pwaRider').classList.add('hidden')" class="w-8 h-8 bg-blue-700 rounded-xl flex items-center justify-center tap text-blue-200"><i class="fas fa-times text-xs"></i></button>
    </div>
</div>

<div id="loginScreen" class="hidden fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6 text-center fade-in relative overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-blue-600 rounded-full blur-[100px] opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-indigo-600 rounded-full blur-[100px] opacity-20"></div>

    <div class="w-full max-w-sm relative z-10 slide-up">
        <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(59,130,246,0.3)] border border-white/10">
            <img id="authLogo" src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" class="w-10 h-10 invert brightness-0">
        </div>
        <h2 class="text-3xl font-black mb-1 text-white tracking-tighter">VIKA PILOT</h2>
        <p class="text-[10px] text-blue-400 mb-8 font-black uppercase tracking-[0.2em]">Delivery Partner Login</p>
        
        <div class="space-y-4">
            <div class="relative">
                <i class="fas fa-phone absolute left-4 top-4 text-slate-500 text-sm"></i>
                <input id="lPhone" type="tel" maxlength="10" placeholder="Registered Mobile" class="w-full bg-slate-900/80 border border-slate-700 p-4 pl-11 rounded-2xl text-white font-bold outline-none focus:border-blue-500 transition text-sm">
            </div>
            <div class="relative">
                <i class="fas fa-lock absolute left-4 top-4 text-slate-500 text-sm"></i>
                <input id="lPass" type="password" placeholder="Password" class="w-full bg-slate-900/80 border border-slate-700 p-4 pl-11 rounded-2xl text-white font-bold outline-none focus:border-blue-500 transition text-sm" onkeydown="if(event.key==='Enter')document.getElementById('loginBtn').click()">
            </div>
            
            <button id="loginBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-[0_10px_20px_rgba(37,99,235,0.3)] tap hover:bg-blue-500 transition mt-2">ACCESS TERMINAL</button>
            <button onclick="document.getElementById('registerModal').classList.remove('hidden')" class="w-full bg-transparent text-slate-400 py-3 rounded-2xl font-bold text-xs border border-slate-700 hover:bg-slate-800 transition tap mt-2">JOIN THE FLEET (REGISTER)</button>
        </div>
    </div>
</div>

<div id="registerModal" class="fixed inset-0 bg-slate-950/98 z-[110] hidden flex items-center justify-center p-6 backdrop-blur-md">
    <div class="bg-slate-900 w-full max-w-sm rounded-[2rem] p-7 border border-slate-800 shadow-2xl slide-up">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="document.getElementById('registerModal').classList.add('hidden')" class="w-9 h-9 bg-slate-800 rounded-xl flex items-center justify-center text-slate-400 tap hover:text-white"><i class="fas fa-arrow-left text-sm"></i></button>
            <h3 class="text-xl font-black text-white">Rider Application</h3>
        </div>
        <div class="space-y-4">
            <input id="regName" placeholder="Full Name" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 text-white outline-none focus:border-blue-500 font-bold text-sm">
            <input id="regPhone" type="tel" maxlength="10" placeholder="Mobile Number" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 text-white outline-none focus:border-blue-500 font-bold text-sm">
            <input id="regPass" type="password" placeholder="Create Password" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 text-white outline-none focus:border-blue-500 font-bold text-sm">
            <select id="regVeh" class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 text-white outline-none focus:border-blue-500 font-bold text-sm">
                <option value="Motorcycle">Motorcycle</option>
                <option value="Scooter">Scooter</option>
                <option value="Electric Bike">Electric Bike</option>
                <option value="Bicycle">Bicycle</option>
            </select>
            <button id="submitRegBtn" class="w-full bg-green-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-green-500 transition tap mt-2">SUBMIT APPLICATION</button>
        </div>
        <p class="text-center text-[10px] text-slate-500 mt-5">Admin will review your request before approval.</p>
    </div>
</div>

<div id="mainApp" class="hidden min-h-screen relative z-10">

    <header class="fixed top-0 left-0 w-full glass z-40 px-5 py-4 flex justify-between items-center border-b border-white/5 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-[14px] bg-blue-600/20 border border-blue-500/30 flex items-center justify-center text-blue-400 font-black text-lg" id="riderAvatarText">?</div>
            <div>
                <h1 class="font-black text-lg leading-tight text-white tracking-tight" id="rName">Pilot</h1>
                <div class="flex items-center gap-1.5 mt-0.5" id="statusIndicator">
                    <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                    <span class="text-[9px] font-bold text-red-500 uppercase tracking-widest">Offline</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-[9px] font-bold text-slate-400 hidden sm:block" id="vehicleLabel"></span>
            <label class="duty-toggle tap">
                <input type="checkbox" id="dutyToggle">
                <span class="duty-slider"></span>
            </label>
        </div>
    </header>

    <div class="pt-24 px-4 pb-6 max-w-lg mx-auto">

        <div class="grid grid-cols-2 gap-3 mb-5">
            <div class="glass p-5 rounded-[1.5rem] relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 w-16 h-16 bg-green-500/10 rounded-full"></div>
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1">Today's Earnings</p>
                <h2 class="text-3xl font-black text-green-400 mt-1">₹<span id="todayEarn">0</span></h2>
                <p class="text-[9px] font-bold text-slate-500 mt-1.5"><span id="todayDeliveries" class="text-slate-300">0</span> deliveries</p>
            </div>
            <div class="glass p-5 rounded-[1.5rem] border border-orange-500/20 relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 w-16 h-16 bg-orange-500/10 rounded-full"></div>
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1">Cash to Deposit</p>
                <h2 class="text-3xl font-black text-orange-400 mt-1">₹<span id="cashHand">0</span></h2>
                <p class="text-[9px] font-bold text-slate-500 mt-1.5">Unsettled COD</p>
            </div>
        </div>

        <div id="gpsAlert" class="hidden bg-blue-900/40 border border-blue-500/30 p-3 rounded-2xl mb-5 flex items-center gap-3 slide-up">
            <i class="fas fa-satellite-dish text-blue-400 blink"></i>
            <p class="text-[10px] font-bold text-blue-200">Live GPS tracking active. Keep app open.</p>
        </div>

        <div class="flex gap-2 mb-5 overflow-x-auto pb-1">
            <button onclick="switchTab('new')" id="tab-new" class="tab-active px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all flex items-center gap-2">
                New <span id="newCount" class="bg-white text-orange-600 text-[9px] px-1.5 py-0.5 rounded-md hidden font-black shadow-sm">0</span>
            </button>
            <button onclick="switchTab('active')" id="tab-active" class="tab-inactive px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all">My Tasks</button>
            <button onclick="switchTab('hist')" id="tab-hist" class="tab-inactive px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all">History</button>
        </div>

        <div id="view-new" class="view-section space-y-4"></div>
        <div id="view-active" class="view-section hidden space-y-4"></div>
        <div id="view-hist" class="view-section hidden space-y-4"></div>
    </div>
</div>

<div id="orderModal" class="fixed inset-0 bg-slate-950/95 z-[80] hidden flex items-end justify-center backdrop-blur-md">
    <div class="bg-slate-900 w-full max-w-md rounded-t-[2.5rem] p-6 slide-up border-t border-slate-700 max-h-[90vh] overflow-y-auto shadow-[0_-20px_40px_rgba(0,0,0,0.5)]">
        <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-6"></div>
        <div id="modalContent"></div>
        <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="w-full mt-5 bg-slate-800 py-4 rounded-xl font-black text-slate-300 text-xs tracking-widest uppercase hover:bg-slate-700 transition tap shadow-sm">Close Details</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, onSnapshot, query, where, arrayUnion, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCwyzE9sdZZUU3dHUix23zEzFkGr2nNRyw",
    authDomain: "foodhub-8ae15.firebaseapp.com",
    projectId: "foodhub-8ae15",
    storageBucket: "foodhub-8ae15.firebasestorage.app",
    messagingSenderId: "274265160043",
    appId: "1:274265160043:web:81238fd424681e7f70342e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let me = null, allShops = [], ordersList = [], isOnline = false, audioAllowed = false;
let globalSettings = { fee: 20 };
let prevNewOrderCount = 0;
let watchId = null;

// Audio init on first tap
document.body.addEventListener('click', () => {
    if (!audioAllowed) {
        document.getElementById('alertSound').play().then(() => {
            document.getElementById('alertSound').pause();
            document.getElementById('alertSound').currentTime = 0;
            audioAllowed = true;
        }).catch(() => {});
    }
}, { once: false });

// PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('pwaRider').classList.remove('hidden');
});
document.getElementById('pwaBtnRider').onclick = async () => { 
    if (deferredPrompt) {
        deferredPrompt.prompt();
        let { outcome } = await deferredPrompt.userChoice;
        if(outcome === 'accepted') document.getElementById('pwaRider').classList.add('hidden');
        deferredPrompt = null;
    }
};

window.onload = () => {
    setTimeout(() => {
        document.getElementById('appLoader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('appLoader').style.display = 'none';
            document.getElementById('loginScreen').classList.remove('hidden');
        }, 500);
    }, 1500);

    onSnapshot(doc(db, "settings", "global"), s => {
        if(s.exists()){
            let d = s.data();
            globalSettings.fee = parseInt(d.fee) || 20;
            if(d.logo) {
                document.getElementById('splashLogo').src = d.logo;
                document.getElementById('authLogo').src = d.logo;
                document.getElementById('pilotFavicon').href = d.logo;
            }
        }
    });

    onSnapshot(collection(db, "shops"), snap => {
        allShops = snap.docs.map(d => ({id: d.id, ...d.data()}));
    });
};

// --- AUTH ---
document.getElementById('loginBtn').onclick = async () => {
    let p = document.getElementById('lPhone').value.trim();
    let pass = document.getElementById('lPass').value.trim();
    if (!p || !pass) return alert("Enter mobile & password");

    let btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;

    try {
        const q = query(collection(db, "riders"), where("phone", "==", p), where("pass", "==", pass));
        const snap = await getDocs(q);

        if (!snap.empty) {
            me = { id: snap.docs[0].id, ...snap.docs[0].data() };
            
            // Block Check Feature
            if(me.isBlocked) {
                alert("⛔ Your Pilot account is BLOCKED by Admin. Contact support.");
                btn.innerHTML = 'Start Engine 🚀';
                btn.disabled = false;
                return;
            }

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            document.getElementById('rName').innerText = me.name.split(' ')[0];
            document.getElementById('riderAvatarText').innerText = me.name[0].toUpperCase();
            document.getElementById('vehicleLabel').innerText = me.vehicle || '';

            if (me.isOnline) {
                isOnline = true;
                document.getElementById('dutyToggle').checked = true;
                setOnlineUI();
            } else {
                setOfflineUI();
            }
            initData();
        } else {
            alert("❌ Account not found. Please check details or register.");
        }
    } catch (e) {
        alert("Connection error. Check internet.");
    }

    btn.innerHTML = 'Start Engine 🚀';
    btn.disabled = false;
};

// --- REGISTER ---
document.getElementById('submitRegBtn').onclick = async () => {
    let n = document.getElementById('regName').value.trim();
    let p = document.getElementById('regPhone').value.trim();
    let ps = document.getElementById('regPass').value.trim();
    let v = document.getElementById('regVeh').value;
    if (!n || !p || !ps || p.length < 10) return alert("Fill all fields with valid 10-digit mobile");

    let btn = document.getElementById('submitRegBtn');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;

    try {
        await addDoc(collection(db, "rider_requests"), { name: n, phone: p, pass: ps, vehicle: v, status: 'Pending', timestamp: Date.now() });
        alert("✅ Application sent!\nAdmin will review and approve within 24hrs.");
        document.getElementById('registerModal').classList.add('hidden');
    } catch(e) {
        alert("Registration failed. Check internet.");
    }
    
    btn.innerHTML = 'SUBMIT APPLICATION';
    btn.disabled = false;
};

// --- DUTY TOGGLE (With Live Geolocation tracking) ---
document.getElementById('dutyToggle').addEventListener('change', async e => {
    isOnline = e.target.checked;
    if (me) {
        try {
            await updateDoc(doc(db, "riders", me.id), { isOnline });
            isOnline ? setOnlineUI() : setOfflineUI();
        } catch (err) {
            console.error("Toggle failed:", err);
        }
    }
});

function setOnlineUI() {
    document.getElementById('statusIndicator').innerHTML = `<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-[9px] font-black text-green-400 uppercase tracking-widest">Online</span>`;
    document.getElementById('gpsAlert').classList.remove('hidden');

    // Start Live GPS Tracking
    if(navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(pos => {
            updateDoc(doc(db,"riders", me.id), {lat: pos.coords.latitude, lng: pos.coords.longitude});
        }, err => console.log("GPS Error:", err), { enableHighAccuracy: true });
    }
    renderAllViews();
}

function setOfflineUI() {
    document.getElementById('statusIndicator').innerHTML = `<span class="w-2 h-2 bg-red-500 rounded-full"></span><span class="text-[9px] font-black text-red-500 uppercase tracking-widest">Offline</span>`;
    document.getElementById('gpsAlert').classList.add('hidden');

    // Stop GPS
    if(watchId) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
    }
    renderAllViews();
}

// --- DATA ---
function initData() {
    onSnapshot(collection(db, "orders"), snap => {
        ordersList = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        if (isOnline) {
            let newOrders = ordersList.filter(o => !o.riderPhone && o.status === 'Ready for Pickup');
            let count = newOrders.length;
            document.getElementById('newCount').innerText = count;
            document.getElementById('newCount').classList.toggle('hidden', count === 0);

            // Play sound when new orders arrive
            if (count > prevNewOrderCount && audioAllowed) {
                document.getElementById('alertSound').play().catch(() => {});
                if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
            }
            prevNewOrderCount = count;
        }

        calculateStats();
        renderAllViews();
    });
}

function calculateStats() {
    if (!me) return;
    let today = new Date().toLocaleDateString('en-IN');
    let myDelivered = ordersList.filter(o => o.riderPhone === me.phone && o.status === 'Delivered');
    
    // Earnings
    let todayDelivered = myDelivered.filter(o => o.date === today);
    let todayEarned = todayDelivered.reduce((acc, o) => acc + (parseInt(o.deliveryFee) || globalSettings.fee), 0);
    let deliveryCount = todayDelivered.length;
    
    // COD Logic (Excluding codSettled true)
    let pendingCodOrders = myDelivered.filter(o => o.paymentMethod !== 'UPI' && !o.codSettled);
    let cashHand = pendingCodOrders.reduce((acc, o) => acc + (parseInt(o.total) || 0), 0);

    document.getElementById('todayEarn').innerText = todayEarned;
    document.getElementById('todayDeliveries').innerText = deliveryCount;
    document.getElementById('cashHand').innerText = cashHand;
}

// --- RENDER ---
window.switchTab = (tab) => {
    ['new', 'active', 'hist'].forEach(t => {
        let btn = document.getElementById(`tab-${t}`);
        let view = document.getElementById(`view-${t}`);
        btn.className = t === tab ? 'tab-active px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all flex items-center gap-2' : 'tab-inactive px-5 py-3 rounded-xl text-[10px] font-black uppercase tracking-wider flex-shrink-0 tap transition-all';
        view?.classList.toggle('hidden', t !== tab);
    });
};

function renderAllViews() {
    if (!isOnline) {
        document.getElementById('view-new').innerHTML = emptyState('fa-power-off text-red-500', 'Duty is Offline', 'Toggle the switch above to go online and receive tasks');
        return;
    }

    let newOrders = ordersList.filter(o => !o.riderPhone && o.status === 'Ready for Pickup');
    document.getElementById('view-new').innerHTML = newOrders.length ? newOrders.map(o => renderCard(o, 'new')).join('') : emptyState('fa-inbox text-slate-600', 'No Pending Tasks', 'Waiting for nearby shops to prepare orders...');

    let activeTasks = ordersList.filter(o => o.riderPhone === me.phone && !['Delivered', 'Cancelled'].includes(o.status));
    document.getElementById('view-active').innerHTML = activeTasks.length ? activeTasks.map(o => renderCard(o, 'active')).join('') : emptyState('fa-road text-slate-600', 'No Active Delivery', 'Accept a task from the New tab to start');

    let history = ordersList.filter(o => o.riderPhone === me.phone && ['Delivered', 'Cancelled'].includes(o.status)).sort((a,b)=>b.timestamp-a.timestamp).slice(0, 15);
    document.getElementById('view-hist').innerHTML = history.length ? history.map(o => renderCard(o, 'hist')).join('') : emptyState('fa-clock-rotate-left text-slate-600', 'No History Yet', 'Your completed deliveries will appear here');
}

function renderCard(o, type) {
    let shop = allShops.find(s => s.id == o.shopId) || { shopName: 'Store', location: '' };
    
    // Using standard Google Maps Directions links
    let shopLink = shop.location ? `https://www.google.com/maps/dir/?api=1&destination=${shop.location}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.shopName)}`;
    let custLink = (o.customer?.lat && o.customer?.lng) ? `https://www.google.com/maps/dir/?api=1&destination=${o.customer.lat},${o.customer.lng}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.customer?.addr || 'Unknown')}`;

    // Action Buttons
    let actionBtn = '';
    if (type === 'new') {
        actionBtn = `<button onclick="acceptOrder('${o.id}')" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg hover:bg-blue-500 transition tap new-order-pulse flex items-center justify-center gap-2"><i class="fas fa-bolt"></i> ACCEPT TASK</button>`;
    } else if (type === 'active') {
        if (o.status === 'Ready for Pickup' || o.status === 'Rider Assigned') {
            actionBtn = `<div class="grid grid-cols-2 gap-2">
                <a href="${shopLink}" target="_blank" class="bg-slate-700 text-white py-4 rounded-xl font-bold text-xs text-center flex items-center justify-center gap-2 tap hover:bg-slate-600 transition shadow"><i class="fas fa-location-arrow text-blue-400"></i> Map</a>
                <button onclick="upd('${o.id}','Out for Delivery')" class="bg-orange-500 text-white py-4 rounded-xl font-black text-xs shadow-lg tap hover:bg-orange-400 transition blink flex items-center justify-center gap-2"><i class="fas fa-box-open"></i> PICKED UP</button>
            </div>`;
        } else if (o.status === 'Out for Delivery') {
            actionBtn = `<div class="grid grid-cols-2 gap-2">
                <a href="${custLink}" target="_blank" class="bg-slate-700 text-white py-4 rounded-xl font-bold text-xs text-center flex items-center justify-center gap-2 tap hover:bg-slate-600 transition shadow"><i class="fas fa-location-arrow text-blue-400"></i> Map</a>
                <button onclick="upd('${o.id}','Arrived')" class="bg-cyan-600 text-white py-4 rounded-xl font-black text-xs shadow-lg tap hover:bg-cyan-500 transition flex items-center justify-center gap-2"><i class="fas fa-house-chimney"></i> ARRIVED</button>
            </div>`;
        } else if (o.status === 'Arrived') {
            let isCod = o.paymentMethod !== 'UPI';
            actionBtn = `<button onclick="upd('${o.id}','Delivered')" class="w-full bg-green-500 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg tap hover:bg-green-400 transition flex items-center justify-center gap-2">
                ${isCod ? '<i class="fas fa-hand-holding-dollar text-lg"></i> COLLECT ₹' + o.total + ' & DELIVER' : '<i class="fas fa-check-double text-lg"></i> MARK DELIVERED'}
            </button>`;
        }
    }

    // UPI Notification Tag
    let upiTag = '';
    if(o.paymentMethod === 'UPI') {
        if(o.paymentApproved) {
            upiTag = `<div class="mt-3 bg-green-900/40 border border-green-500/50 rounded-xl p-2.5 flex items-center gap-2"><i class="fas fa-check-circle text-green-400 text-lg"></i> <p class="text-[10px] font-black text-green-300">UPI VERIFIED BY ADMIN. DO NOT COLLECT CASH.</p></div>`;
        } else {
            upiTag = `<div class="mt-3 bg-red-900/40 border border-red-500/50 rounded-xl p-2.5 flex items-center gap-2 blink"><i class="fas fa-triangle-exclamation text-red-400 text-lg"></i> <p class="text-[10px] font-black text-red-300">UPI UNVERIFIED. WAIT FOR ADMIN APPROVAL.</p></div>`;
        }
    } else {
        upiTag = `<div class="mt-3 bg-orange-900/40 border border-orange-500/50 rounded-xl p-2.5 flex items-center gap-2"><i class="fas fa-money-bill-wave text-orange-400 text-lg"></i> <p class="text-[10px] font-black text-orange-300">CASH ON DELIVERY. COLLECT ₹${o.total}.</p></div>`;
    }

    let borderColor = type === 'new' ? 'border-blue-500/50' : type === 'active' ? 'border-orange-500/50' : 'border-slate-700';

    return `
    <div class="glass p-5 rounded-[2rem] slide-up mb-4 border-l-[4px] ${borderColor} shadow-lg relative overflow-hidden">
        ${type === 'new' ? '<div class="absolute top-0 right-0 bg-blue-600 text-white text-[8px] font-black px-3 py-1 rounded-bl-xl uppercase tracking-widest">New Task</div>' : ''}
        
        <div class="flex justify-between items-start mb-4">
            <div>
                <span class="bg-slate-800 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase text-slate-300 border border-white/10 shadow-inner">#${o.id.substr(0, 6).toUpperCase()}</span>
                <p class="text-[10px] text-slate-500 mt-2 font-bold">${new Date(o.timestamp).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}</p>
            </div>
            <div class="text-right mt-1">
                <span class="font-black text-white text-2xl">₹${o.total}</span>
            </div>
        </div>

        <div class="space-y-3 mb-2 bg-slate-900/50 p-4 rounded-2xl border border-white/5">
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 bg-orange-600/20 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5 border border-orange-500/30"><i class="fas fa-store text-orange-400 text-sm"></i></div>
                <div>
                    <p class="font-black text-sm text-white leading-tight">${shop.shopName}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Pickup Point</p>
                </div>
            </div>
            <div class="ml-4 border-l-2 border-dashed border-slate-600 h-4"></div>
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 bg-blue-600/20 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5 border border-blue-500/30"><i class="fas fa-location-dot text-blue-400 text-sm"></i></div>
                <div>
                    <p class="font-black text-sm text-white leading-tight">${o.customer?.name || 'Customer'}</p>
                    <p class="text-[10px] text-slate-400 line-clamp-2 pr-2 leading-tight">${o.customer?.addr || 'Address not provided'}</p>
                </div>
            </div>
        </div>

        ${upiTag}

        <div class="flex gap-2 items-center mt-4">
            <button onclick="showDetails('${o.id}')" class="bg-slate-800 w-12 h-12 rounded-xl text-slate-300 flex items-center justify-center hover:bg-slate-700 transition tap flex-shrink-0 border border-slate-700 shadow-sm"><i class="fas fa-receipt text-base"></i></button>
            ${type !== 'hist' ? `<a href="tel:${o.customer?.phone}" class="bg-slate-800 w-12 h-12 rounded-xl text-green-400 flex items-center justify-center hover:bg-slate-700 transition tap flex-shrink-0 border border-slate-700 shadow-sm"><i class="fas fa-phone text-base"></i></a>` : ''}
            <div class="flex-1">${actionBtn}</div>
        </div>

        ${type === 'hist' ? `<div class="mt-4 pt-3 border-t border-white/5 text-center"><span class="text-[10px] font-black uppercase tracking-widest ${o.status === 'Delivered' ? 'text-green-500' : 'text-red-500'} bg-slate-900 py-1.5 px-4 rounded-full">${o.status}</span></div>` : ''}
    </div>`;
}

function emptyState(icon, title, subtitle) {
    return `<div class="text-center py-20 opacity-30 mt-10">
        <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-5 border-2 border-slate-700">
            <i class="fas ${icon} text-3xl"></i>
        </div>
        <p class="font-black text-lg text-white">${title}</p>
        <p class="text-xs mt-2 text-slate-400 max-w-[200px] mx-auto leading-relaxed">${subtitle}</p>
    </div>`;
}

// --- ACTIONS ---
window.acceptOrder = async (oid) => {
    if (!isOnline) return alert("Please turn Duty Toggle ON first!");
    if (!me) return;
    try {
        await updateDoc(doc(db, "orders", oid), {
            riderPhone: me.phone,
            riderName: me.name,
            status: 'Rider Assigned',
            timeline: arrayUnion({ status: 'Rider Assigned', time: new Date().toLocaleTimeString() })
        });
        switchTab('active');
    } catch (e) {
        alert("Error accepting order. Someone else might have taken it.");
    }
};

window.upd = async (oid, status) => {
    let o = ordersList.find(x => x.id === oid);
    if (!o) return;

    if (status === 'Delivered' && o.paymentMethod !== 'UPI') {
        if (!confirm(`⚠️ CASH COLLECTION: ₹${o.total}\n\nHave you collected the cash from customer?`)) return;
    }
    
    if (status === 'Delivered' && o.paymentMethod === 'UPI' && !o.paymentApproved) {
        if (!confirm(`⚠️ UPI is UNVERIFIED by Admin.\n\nAre you sure you want to mark it delivered anyway?`)) return;
    }

    try {
        await updateDoc(doc(db, "orders", oid), {
            status,
            timeline: arrayUnion({ status, time: new Date().toLocaleTimeString() })
        });
        if (status === 'Delivered' && navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
    } catch (e) {
        alert("Update failed. Check connection.");
    }
};

window.showDetails = (oid) => {
    let o = ordersList.find(x => x.id === oid);
    if (!o) return;
    
    let itemsHtml = (o.items || []).map(i => `
        <div class="flex justify-between items-center py-2.5 border-b border-white/5 last:border-0">
            <div class="flex items-center gap-3">
                <span class="w-6 text-center text-orange-400 font-black text-[10px] bg-orange-500/10 py-1 rounded">${i.qty}x</span>
                <span class="text-slate-200 text-xs font-bold">${i.name}</span>
            </div>
            <span class="font-black text-white text-xs">₹${i.price * i.qty}</span>
        </div>`).join('');

    let shopInfo = allShops.find(s => s.id == o.shopId);
    let shopLink = shopInfo?.location ? `https://www.google.com/maps/dir/?api=1&destination=${shopInfo.location}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shopInfo?.shopName)}`;

    document.getElementById('modalContent').innerHTML = `
        <div class="text-center mb-6">
            <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-1">Total Bill</p>
            <h2 class="text-5xl font-black text-white">₹${o.total}</h2>
            <span class="text-[10px] font-black px-4 py-1.5 rounded-full ${o.paymentMethod === 'UPI' ? 'text-green-400 bg-green-400/10 border-green-400/20' : 'text-orange-400 bg-orange-400/10 border-orange-400/20'} mt-3 inline-block border uppercase tracking-wider">${o.paymentMethod || 'COD'}</span>
        </div>

        <div class="space-y-4">
            <div class="bg-slate-800/60 p-4 rounded-[1.5rem] border border-white/5 shadow-inner">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-3 tracking-widest"><i class="fas fa-box-open mr-1"></i> Order Items</p>
                ${itemsHtml}
                <div class="flex justify-between pt-3 mt-1 border-t border-white/10">
                    <span class="text-xs text-slate-400 font-bold">Delivery Fee</span>
                    <span class="text-xs font-black text-orange-400">₹${o.deliveryFee || globalSettings.fee}</span>
                </div>
            </div>

            <div class="bg-slate-800/60 p-4 rounded-[1.5rem] border border-white/5 shadow-inner">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-2 tracking-widest"><i class="fas fa-user mr-1"></i> Customer</p>
                <p class="text-white font-black text-sm">${o.customer?.name}</p>
                <p class="text-slate-400 text-[11px] mt-1.5 leading-relaxed">${o.customer?.addr}</p>
                <a href="tel:${o.customer?.phone}" class="mt-4 flex items-center justify-center gap-2 bg-green-600 py-3 rounded-xl text-xs font-black text-white tap hover:bg-green-700 transition shadow">
                    <i class="fas fa-phone"></i> CALL CUSTOMER
                </a>
            </div>

            ${shopInfo ? `<div class="bg-slate-800/60 p-4 rounded-[1.5rem] border border-white/5 shadow-inner">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-2 tracking-widest"><i class="fas fa-store mr-1"></i> Pickup Shop</p>
                <p class="text-white font-black text-sm">${shopInfo.shopName}</p>
                <a href="${shopLink}" target="_blank" class="mt-3 block text-center py-3 bg-slate-700 rounded-xl text-[10px] font-black text-blue-400 hover:text-blue-300 transition tap shadow"><i class="fas fa-location-arrow mr-1.5"></i> GET DIRECTIONS</a>
            </div>` : ''}

            ${o.utr ? `<div class="bg-blue-900/20 p-4 rounded-[1.5rem] border border-blue-500/20 text-center">
                <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest mb-1">UPI Reference No.</p>
                <p class="text-white font-black text-base tracking-wider">${o.utr}</p>
            </div>` : ''}
        </div>`;

    document.getElementById('orderModal').classList.remove('hidden');
};
</script>
</body>
</html>
