<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIKA Partner | Business Dashboard</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ea580c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        
        /* Custom Toggles */
        .toggle-checkbox:checked { right: 0; border-color: #22c55e; }
        .toggle-checkbox:checked + .toggle-label { background-color: #22c55e; }
        .toggle-checkbox { right: auto; left: 0; }
        .toggle-label { width: 3rem; height: 1.5rem; }
        .toggle-checkbox { width: 1.5rem; height: 1.5rem; }

        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        .active-tab { color: #ea580c; border-bottom: 2px solid #ea580c; background: #fff7ed; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="select-none text-slate-800">

    <audio id="orderSound" src="https://assets.mixkit.co/active_storage/sfx/933/933-preview.mp3" preload="auto"></audio>

    <div id="installBox" class="hidden fixed top-4 left-4 right-4 bg-slate-900 text-white p-4 rounded-2xl shadow-2xl z-[100] flex justify-between items-center slide-up">
        <div class="flex items-center gap-3">
             <div class="w-10 h-10 bg-orange-600 rounded-xl flex items-center justify-center"><i class="fas fa-download text-white"></i></div>
             <div><p class="text-xs font-bold">Install Partner App</p><p class="text-[9px] text-slate-400">Manage orders easily</p></div>
        </div>
        <button id="installBtn" class="bg-white text-slate-900 px-4 py-2 rounded-xl text-[10px] font-black">INSTALL</button>
    </div>

    <div id="login" class="fixed inset-0 bg-slate-50 z-50 flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <div class="w-24 h-24 bg-gradient-to-tr from-orange-500 to-red-600 rounded-[2rem] flex items-center justify-center mx-auto mb-8 text-white text-4xl font-black shadow-2xl rotate-3 border-4 border-white">P</div>
            <h2 class="text-3xl font-black mb-2 text-slate-900 tracking-tighter">VIKA PARTNER</h2>
            <p class="text-xs text-slate-400 mb-8 font-bold uppercase tracking-widest">Business Management Suite</p>
            
            <div class="space-y-4">
                <input id="lPhone" type="tel" placeholder="Registered Mobile" class="w-full bg-white border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-orange-500 transition shadow-sm">
                <input id="lPass" type="password" placeholder="Password" class="w-full bg-white border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-orange-500 transition shadow-sm">
                <button id="loginBtn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-xl hover:scale-[1.02] transition">ACCESS DASHBOARD</button>
            </div>
            
            <p class="mt-8 text-xs font-bold text-slate-400">New Business? <button onclick="showRegister()" class="text-orange-600 underline">Register Here</button></p>
        </div>
    </div>

    <div id="register" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm relative h-full overflow-y-auto pt-4 pb-10 hide-scroll">
            <button onclick="showLogin()" class="mb-4 text-slate-400 font-bold text-xs flex items-center gap-1 hover:text-slate-800"><i class="fas fa-arrow-left"></i> Back to Login</button>
            <h2 class="text-2xl font-black mb-6 text-slate-800">Partner Registration</h2>
            
            <div class="space-y-4">
                <div><label class="text-[10px] font-black text-slate-400 uppercase ml-2">Shop Name</label><input id="regShopName" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold bg-slate-50 outline-none focus:border-orange-500"></div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase ml-2">Owner Mobile</label><input id="regPhone" type="tel" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold bg-slate-50 outline-none focus:border-orange-500"></div>
                
                <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100 text-center">
                    <button onclick="detectLocation()" id="locBtn" class="w-full py-3 bg-white text-orange-600 border border-orange-200 rounded-xl text-xs font-black shadow-sm flex items-center justify-center gap-2 hover:bg-orange-600 hover:text-white transition"><i class="fas fa-map-marker-alt"></i> DETECT GPS LOCATION</button>
                    <input type="hidden" id="latLngStr">
                    <p id="locStatus" class="text-[9px] text-slate-400 mt-2 font-bold">Required for riders to locate you</p>
                </div>
                
                <div><label class="text-[10px] font-black text-slate-400 uppercase ml-2">Description / Address</label><textarea id="regBio" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold bg-slate-50 outline-none focus:border-orange-500 h-20"></textarea></div>
            </div>
            
            <button onclick="submitRequest()" id="submitBtn" class="bg-green-600 text-white w-full py-4 rounded-2xl font-black shadow-xl mt-8 hover:scale-[1.02] transition">SUBMIT APPLICATION</button>
        </div>
    </div>

    <div id="dash" class="hidden min-h-screen">
        
        <header class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-40 px-5 py-4 flex justify-between items-center border-b border-slate-100 shadow-sm">
            <div>
                <h1 class="font-black text-xl leading-none text-slate-800 tracking-tight" id="sName">Shop</h1>
                <div class="flex items-center gap-1.5 mt-1" id="statusIndicator">
                    <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Closed</span>
                </div>
            </div>
            <div class="relative inline-block w-12 align-middle select-none">
                <input type="checkbox" name="toggle" id="shopToggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300"/>
                <label for="shopToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-200 cursor-pointer transition-colors duration-300"></label>
            </div>
        </header>

        <div class="pt-24 px-4 pb-24 max-w-3xl mx-auto">
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1">Today's Sales</p>
                    <h2 class="text-2xl font-black text-slate-800">₹<span id="shopSales">0</span></h2>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest mb-1">Total Orders</p>
                    <h2 class="text-2xl font-black text-orange-600" id="orderCount">0</h2>
                </div>
            </div>

            <div class="flex bg-white p-1.5 rounded-xl shadow-sm border border-slate-100 mb-6 overflow-x-auto">
                <button onclick="switchTab('orders')" id="tab-orders" class="flex-1 py-2.5 rounded-lg text-xs font-black transition-all active-tab">Live Orders</button>
                <button onclick="switchTab('menu')" id="tab-menu" class="flex-1 py-2.5 rounded-lg text-xs font-black text-slate-400 hover:bg-slate-50 transition-all">Menu</button>
                <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2.5 rounded-lg text-xs font-black text-slate-400 hover:bg-slate-50 transition-all">History</button>
            </div>

            <div id="view-orders" class="space-y-4">
                <div id="ordersList" class="pb-20"></div>
            </div>

            <div id="view-menu" class="hidden space-y-6">
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 class="font-black text-sm mb-4 flex items-center gap-2"><i class="fas fa-plus-circle text-orange-500"></i> Add New Item</h3>
                    <div class="space-y-3">
                        <input id="pName" placeholder="Item Name (e.g. Butter Naan)" class="w-full border-2 border-slate-100 p-3 rounded-xl text-xs font-bold outline-none focus:border-orange-500">
                        <div class="flex gap-3">
                            <input id="pPrice" type="number" placeholder="Price (₹)" class="w-1/2 border-2 border-slate-100 p-3 rounded-xl text-xs font-bold outline-none focus:border-orange-500">
                            <select id="pCat" class="w-1/2 border-2 border-slate-100 p-3 rounded-xl text-xs font-bold outline-none focus:border-orange-500 bg-white">
                                <option>Food</option><option>Sweets</option><option>Snacks</option><option>Beverage</option><option>Tech</option>
                            </select>
                        </div>
                        <div class="border-2 border-dashed border-slate-200 p-3 rounded-xl text-center relative cursor-pointer hover:bg-slate-50 transition">
                            <input id="pImg" type="file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <p class="text-[10px] font-bold text-slate-400"><i class="fas fa-camera mr-1"></i> Click to Upload Photo (Auto-Resized)</p>
                        </div>
                        <button id="addProdBtn" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black text-xs shadow-lg">ADD TO MENU</button>
                    </div>
                </div>

                <div>
                    <h3 class="font-black text-sm mb-3 ml-2 text-slate-500 uppercase tracking-widest">Inventory</h3>
                    <div id="menuList" class="grid grid-cols-1 gap-3"></div>
                </div>
            </div>

            <div id="view-history" class="hidden space-y-4">
                <div id="historyList" class="pb-20"></div>
            </div>

        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-slate-950/80 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 slide-up shadow-2xl">
            <h3 class="font-black text-xl mb-4">Edit Item</h3>
            <input type="hidden" id="editId">
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Item Name</label>
                    <input id="editName" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Price (₹)</label>
                    <input id="editPrice" type="number" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Category</label>
                    <select id="editCat" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold outline-none focus:border-orange-500 bg-white">
                        <option>Food</option><option>Sweets</option><option>Snacks</option><option>Beverage</option><option>Tech</option>
                    </select>
                </div>
                <button onclick="saveEdit()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black mt-2 shadow-lg">SAVE CHANGES</button>
                <button onclick="document.getElementById('editModal').classList.add('hidden')" class="w-full text-center text-xs font-bold text-slate-400 py-2">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, onSnapshot, query, where, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCwyzE9sdZZUU3dHUix23zEzFkGr2nNRyw", authDomain: "foodhub-8ae15.firebaseapp.com", projectId: "foodhub-8ae15", storageBucket: "foodhub-8ae15.firebasestorage.app", messagingSenderId: "274265160043", appId: "1:274265160043:web:81238fd424681e7f70342e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let me = null;
        let products = [];
        let audioAllowed = false;

        // --- SETUP ---
        document.body.addEventListener('click', () => {
            if(!audioAllowed) {
                document.getElementById('orderSound').play().then(() => {
                    document.getElementById('orderSound').pause();
                    document.getElementById('orderSound').currentTime = 0;
                    audioAllowed = true;
                }).catch(e => console.log("Audio waiting..."));
            }
        });

        // --- AUTH ---
        document.getElementById('loginBtn').onclick = async () => {
            let p = document.getElementById('lPhone').value, pass = document.getElementById('lPass').value;
            if(!p || !pass) return alert("Enter credentials");
            
            document.getElementById('loginBtn').innerText = "VERIFYING...";
            const q = query(collection(db, "shops"), where("phone", "==", p), where("pass", "==", pass));
            const snap = await getDocs(q);
            
            if(!snap.empty) {
                me = { id: snap.docs[0].id, ...snap.docs[0].data() };
                document.getElementById('login').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
                document.getElementById('sName').innerText = me.shopName;
                document.getElementById('shopToggle').checked = me.isOpen || false;
                updateStatusUI(me.isOpen || false);
                initDashboard();
            } else {
                alert("Invalid Login");
                document.getElementById('loginBtn').innerText = "ACCESS DASHBOARD";
            }
        };

        // --- DASHBOARD INIT ---
        function initDashboard() {
            // Live Orders
            const q = query(collection(db, "orders"), where("shopId", "==", me.id));
            onSnapshot(q, (snap) => {
                let orders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                orders.sort((a,b) => b.timestamp - a.timestamp);
                
                let active = orders.filter(o => ['Pending', 'Preparing', 'Ready for Pickup'].includes(o.status));
                let history = orders.filter(o => ['Delivered', 'Cancelled', 'Out for Delivery'].includes(o.status));
                
                renderActiveOrders(active);
                renderHistory(history);
                updateStats(orders);
                
                // Alert Sound
                if(active.some(o => o.status === 'Pending') && audioAllowed) {
                    document.getElementById('orderSound').play().catch(()=>{});
                }
            });

            // Inventory Products
            const pQ = query(collection(db, "products"), where("shopId", "==", me.id));
            onSnapshot(pQ, (snap) => {
                products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderMenu();
            });
        }

        // --- RENDER FUNCTIONS ---
        function renderActiveOrders(orders) {
            let container = document.getElementById('ordersList');
            if(orders.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-40"><i class="fas fa-mug-hot text-5xl mb-4"></i><p class="font-bold text-sm">No live orders</p></div>`;
                return;
            }
            container.innerHTML = orders.map(o => `
            <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm slide-up relative overflow-hidden">
                ${o.status === 'Pending' ? '<div class="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-black px-3 py-1 rounded-bl-xl blink">NEW</div>' : ''}
                <div class="flex justify-between items-start mb-4">
                    <div><span class="text-xs font-black bg-slate-100 px-2 py-1 rounded text-slate-500">#${o.id.substr(0,4)}</span><h4 class="font-black text-slate-800 mt-1">${o.customer.name}</h4></div>
                    <div class="text-right"><span class="block font-black text-xl text-slate-900">₹${o.total}</span><span class="text-[10px] font-bold text-orange-500">${o.paymentMethod}</span></div>
                </div>
                <div class="space-y-2 mb-4">${o.items.map(i => `<div class="flex justify-between text-xs font-bold text-slate-600 border-b border-dashed border-slate-100 pb-1"><span>${i.name} <span class="text-orange-500">x${i.qty}</span></span><span>₹${i.price*i.qty}</span></div>`).join('')}</div>
                
                ${o.status === 'Pending' ? `
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="window.updateOrder('${o.id}', 'Cancelled')" class="py-3 rounded-xl border-2 border-slate-100 font-bold text-xs text-slate-400">REJECT</button>
                        <button onclick="window.updateOrder('${o.id}', 'Preparing')" class="py-3 rounded-xl bg-orange-600 text-white font-black text-xs shadow-lg">ACCEPT</button>
                    </div>` : 
                  o.status === 'Preparing' ? 
                    `<button onclick="window.updateOrder('${o.id}', 'Ready for Pickup')" class="w-full py-3 rounded-xl bg-green-500 text-white font-black text-xs shadow-lg">MARK READY <i class="fas fa-check"></i></button>` : 
                    `<div class="bg-green-50 text-green-700 p-3 rounded-xl text-center text-xs font-bold border border-green-100">Waiting for Rider</div>`
                }
            </div>`).join('');
        }

        function renderMenu() {
            document.getElementById('menuList').innerHTML = products.map(p => `
            <div class="bg-white p-3 rounded-2xl border border-slate-100 flex gap-3 items-center relative group">
                <div class="w-16 h-16 rounded-xl overflow-hidden bg-slate-50 relative">
                    <img src="${p.img}" class="w-full h-full object-cover">
                    ${!p.inStock ? '<div class="absolute inset-0 bg-black/50 flex items-center justify-center"><span class="text-[8px] font-black text-white uppercase">No Stock</span></div>' : ''}
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-xs text-slate-800">${p.name}</h4>
                    <p class="text-xs font-black text-orange-500">₹${p.price}</p>
                    <div class="flex gap-2 mt-2">
                        <button onclick="window.openEdit('${p.id}')" class="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg text-[10px] font-bold"><i class="fas fa-pen"></i> Edit</button>
                        <button onclick="window.toggleStock('${p.id}', ${p.inStock})" class="${p.inStock ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'} px-2 py-1 rounded-lg text-[10px] font-bold">${p.inStock ? 'In Stock' : 'Out Stock'}</button>
                    </div>
                </div>
                <button onclick="window.deleteProduct('${p.id}')" class="absolute top-2 right-2 w-7 h-7 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash text-[10px]"></i></button>
            </div>`).join('');
        }

        // --- EDIT & INVENTORY LOGIC ---
        window.toggleStock = async (id, status) => {
            await updateDoc(doc(db, "products", id), { inStock: !status });
        };

        window.openEdit = (id) => {
            let p = products.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = p.name;
            document.getElementById('editPrice').value = p.price;
            document.getElementById('editCat').value = p.cat;
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.saveEdit = async () => {
            let id = document.getElementById('editId').value;
            await updateDoc(doc(db, "products", id), {
                name: document.getElementById('editName').value,
                price: document.getElementById('editPrice').value,
                cat: document.getElementById('editCat').value
            });
            document.getElementById('editModal').classList.add('hidden');
        };

        window.deleteProduct = async (id) => {
            if(confirm("Delete this item permanently?")) await deleteDoc(doc(db, "products", id));
        };

        window.updateOrder = async (id, status) => {
            if(status === 'Cancelled' && !confirm("Reject order?")) return;
            await updateDoc(doc(db, "orders", id), { 
                status: status, 
                timeline: arrayUnion({ status: status, time: new Date().toLocaleTimeString() }) 
            });
        };

        // --- AUTO IMAGE RESIZER FUNCTION ---
        const compressImage = async (file, { quality = 0.6, type = 'image/jpeg', maxWidth = 800 } = {}) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL(type, quality));
                    };
                    img.onerror = error => reject(error);
                };
            });
        };

        // --- ADD PRODUCT WITH RESIZER ---
        document.getElementById('addProdBtn').onclick = async () => {
            let name = document.getElementById('pName').value;
            let price = document.getElementById('pPrice').value;
            let file = document.getElementById('pImg').files[0];
            
            if(!name || !price || !file) return alert("Fill all details");
            
            let btn = document.getElementById('addProdBtn'); 
            btn.innerText = "COMPRESSING...";
            
            try {
                // 1. Resize Image
                const resizedBase64 = await compressImage(file);
                
                // 2. Upload
                btn.innerText = "UPLOADING...";
                await addDoc(collection(db, "products"), { 
                    shopId: me.id, 
                    name, 
                    price, 
                    cat: document.getElementById('pCat').value, 
                    img: resizedBase64, 
                    inStock: true, 
                    timestamp: Date.now() 
                });
                
                alert("Item Added Successfully!"); 
                btn.innerText = "ADD TO MENU"; 
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImg').value = '';

            } catch (e) {
                console.error(e);
                alert("Error processing image");
                btn.innerText = "ADD TO MENU";
            }
        };

        // --- UTILS ---
        window.switchTab = (tab) => {
            ['orders', 'menu', 'history'].forEach(t => {
                document.getElementById('view-'+t).classList.add('hidden');
                document.getElementById('tab-'+t).classList.remove('active-tab', 'text-orange-600');
            });
            document.getElementById('view-'+tab).classList.remove('hidden');
            document.getElementById('tab-'+tab).classList.add('active-tab');
        };
        
        document.getElementById('shopToggle').addEventListener('change', async (e) => {
            updateStatusUI(e.target.checked);
            if(me) await updateDoc(doc(db, "shops", me.id), { isOpen: e.target.checked });
        });

        function updateStatusUI(isOpen) {
            document.getElementById('statusIndicator').innerHTML = isOpen ? 
                `<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-[9px] font-bold text-green-500 uppercase tracking-wider">Online</span>` : 
                `<span class="w-2 h-2 bg-red-500 rounded-full"></span><span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Closed</span>`;
        }

        function updateStats(orders) {
            document.getElementById('shopSales').innerText = orders.filter(o => o.status === 'Delivered').reduce((a,b) => a + (parseInt(b.total) || 0), 0);
            document.getElementById('orderCount').innerText = orders.length;
        }
        
        // Render history
        function renderHistory(orders) {
            let container = document.getElementById('historyList');
            if(orders.length===0) return container.innerHTML = `<div class="text-center py-10 opacity-40"><p class="font-bold text-xs">No history</p></div>`;
            container.innerHTML = orders.map(o => `<div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center opacity-75 grayscale hover:grayscale-0 transition-all"><div><p class="text-[10px] font-bold text-slate-400">${new Date(o.timestamp).toLocaleString()}</p><p class="text-xs font-black text-slate-800">#${o.id.substr(0,4)}</p><p class="text-[10px] font-bold text-slate-500 uppercase">${o.status}</p></div><p class="font-black text-slate-900">₹${o.total}</p></div>`).join('');
        }
        
        // PWA Install Prompt
        let deferredPrompt; window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBox').classList.remove('hidden'); }); document.getElementById('installBtn').onclick = () => { if(deferredPrompt) deferredPrompt.prompt(); };
        window.showRegister = () => { document.getElementById('login').classList.add('hidden'); document.getElementById('register').classList.remove('hidden'); };
        window.showLogin = () => { document.getElementById('register').classList.add('hidden'); document.getElementById('login').classList.remove('hidden'); };
        window.detectLocation = () => { let btn=document.getElementById('locBtn'); btn.innerText="Locating..."; navigator.geolocation.getCurrentPosition(p=>{ document.getElementById('latLngStr').value=`${p.coords.latitude},${p.coords.longitude}`; btn.innerText="Location Saved"; btn.classList.add('bg-green-500','text-white'); }, ()=>alert("GPS Error")); };
        window.submitRequest = async () => { if(!document.getElementById('regShopName').value || !document.getElementById('latLngStr').value) return alert("Fill all details"); await addDoc(collection(db,"shop_requests"),{shopName:document.getElementById('regShopName').value, phone:document.getElementById('regPhone').value, location:document.getElementById('latLngStr').value, bio:document.getElementById('regBio').value, status:'Pending', timestamp:Date.now()}); alert("Sent!"); location.reload(); };

    </script>
</body>
</html>
